<!DOCTYPE html>
<html lang="ar" dir="rtl" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>بحث — IDLEB TV</title>
  <link rel="icon" href="../assets/favicon.svg" />
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/main.css" />
  <link rel="stylesheet" href="../css/components.css" />
  <link rel="stylesheet" href="../css/responsive.css" />
</head>
<body>
  <div id="app-loader" class="app-loader"><div class="loader-logo gradient-text">IDLEB TV</div><div class="loader-bar"><div class="loader-bar-inner"></div></div></div>
  <canvas id="particles" class="particles-canvas"></canvas>
  <header id="navbar" class="navbar">
    <nav class="navbar-inner">
      <a href="../index.html" class="logo"><span class="logo-play">▶</span><span class="logo-text gradient-text">IDLEB</span><span class="logo-tv">TV</span></a>
      <ul class="nav-links"><li><a href="../index.html">الرئيسية</a></li><li><a href="series.html">المسلسلات</a></li><li><a href="categories.html">التصنيفات</a></li></ul>
      <div class="nav-actions">
        <button id="theme-toggle" class="icon-btn"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg></button>
        <a href="login.html" id="auth-btn" class="btn-primary">دخول</a>
      </div>
    </nav>
  </header>
  <main>
    <div class="page-head"><h1>🔍 بحث</h1></div>
    <div style="max-width:1400px;margin:0 auto;padding:0 1.5rem">
      <div style="position:relative;margin-bottom:2rem">
        <input id="search-input" type="search" autofocus placeholder="ابحث عن مسلسل..." class="input" style="padding:1rem 3rem 1rem 1rem;font-size:1.125rem" />
        <svg style="position:absolute;right:1rem;top:50%;transform:translateY(-50%);color:var(--muted)" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
      </div>
      <div id="history-tags" style="margin-bottom:2rem"></div>
      <div id="results" class="grid-cards"></div>
    </div>
  </main>
  <footer class="site-footer"><div class="footer-bottom">© <span id="year"></span> IDLEB TV</div></footer>
  <div id="toast-container" class="toast-container"></div>

  <script src="../js/config.js"></script>
  <script src="../js/store.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/utils.js"></script>
  <script src="../js/ui.js"></script>
  <script src="../js/particles.js"></script>
  <script src="../js/main.js"></script>
  <script>
    (function () {
      const { escapeHTML, seriesCardHTML, attachCardEvents, skeletonCard, debounce, showToast } = IDLEB.utils;
      const { api } = IDLEB;
      const input = document.getElementById('search-input');
      const results = document.getElementById('results');
      const tags = document.getElementById('history-tags');

      function renderHistory() {
        const hist = IDLEB.stores.searchHistory.get().history || [];
        if (!hist.length) { tags.innerHTML = ''; return; }
        tags.innerHTML = `
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:0.75rem">
            <h3 style="font-size:0.875rem;color:var(--muted)">عمليات بحث سابقة</h3>
            <button id="clear-hist" class="btn-ghost" style="font-size:0.75rem;color:var(--primary-3)">مسح</button>
          </div>
          <div style="display:flex;flex-wrap:wrap;gap:0.5rem">
            ${hist.map((h) => `<button class="glass" data-h="${escapeHTML(h)}" style="padding:0.5rem 1rem;border-radius:999px;font-size:0.875rem;cursor:pointer">${escapeHTML(h)}</button>`).join('')}
          </div>
        `;
        document.getElementById('clear-hist').onclick = () => {
          IDLEB.stores.searchHistory.set({ history: [] });
          renderHistory();
        };
        tags.querySelectorAll('[data-h]').forEach((b) => b.onclick = () => {
          input.value = b.dataset.h;
          input.dispatchEvent(new Event('input'));
        });
      }
      renderHistory();

      const run = debounce(async (q) => {
        if (q.length < 2) { results.innerHTML = ''; return; }
        results.innerHTML = Array.from({ length: 6 }, skeletonCard).join('');
        const { data } = await api.search(q);
        window.IDLEB_MOCK_DATA = window.IDLEB_MOCK_DATA || [];
        data.forEach((s) => { if (!window.IDLEB_MOCK_DATA.find((x) => x.id === s.id)) window.IDLEB_MOCK_DATA.push(s); });
        results.innerHTML = data.length ? data.map(seriesCardHTML).join('') :
          `<div class="empty-state"><p>لا توجد نتائج لـ "${escapeHTML(q)}"</p></div>`;
        attachCardEvents(results);
      }, 350);

      input.addEventListener('input', (e) => run(e.target.value));
      input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && input.value) {
          const h = IDLEB.stores.searchHistory.get().history || [];
          const filtered = h.filter((x) => x !== input.value);
          IDLEB.stores.searchHistory.set({ history: [input.value, ...filtered].slice(0, 10) });
          renderHistory();
        }
      });
    })();
  </script>
</body>
</html>
