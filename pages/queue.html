<!DOCTYPE html>
<html lang="ar" dir="rtl" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>شاهد لاحقاً — IDLEB TV</title>
  <link rel="icon" href="../assets/favicon.svg" />
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/main.css" />
  <link rel="stylesheet" href="../css/components.css" />
  <link rel="stylesheet" href="../css/responsive.css" />
</head>
<body>
  <div id="app-loader" class="app-loader"><div class="loader-logo gradient-text">IDLEB TV</div><div class="loader-bar"><div class="loader-bar-inner"></div></div></div>
  <canvas id="particles" class="particles-canvas"></canvas>
  <header id="navbar" class="navbar">
    <nav class="navbar-inner">
      <a href="../index.html" class="logo"><span class="logo-play">▶</span><span class="logo-text gradient-text">IDLEB</span><span class="logo-tv">TV</span></a>
      <ul class="nav-links"><li><a href="../index.html">الرئيسية</a></li></ul>
      <div class="nav-actions"><button id="theme-toggle" class="icon-btn"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg></button><a href="login.html" id="auth-btn" class="btn-primary">دخول</a></div>
    </nav>
  </header>
  <main>
    <div class="page-head"><h1>⏰ شاهد لاحقاً</h1><button class="btn-ghost" id="clear" style="color:#FCA5A5">مسح</button></div>
    <div style="max-width:64rem;margin:0 auto;padding:0 1.5rem" id="content"></div>
  </main>
  <footer class="site-footer"><div class="footer-bottom">© <span id="year"></span> IDLEB TV</div></footer>
  <div id="toast-container" class="toast-container"></div>
  <script src="../js/config.js"></script>
  <script src="../js/store.js"></script>
  <script src="../js/utils.js"></script>
  <script src="../js/ui.js"></script>
  <script src="../js/particles.js"></script>
  <script src="../js/main.js"></script>
  <script>
    (function () {
      const { escapeHTML } = IDLEB.utils;
      function render() {
        const items = IDLEB.stores.queue.get().items;
        const c = document.getElementById('content');
        if (!items.length) { c.innerHTML = '<div class="empty-state"><p>قائمة المشاهدة اللاحقة فارغة</p><p class="sub">اضغط "لاحقاً" على أي حلقة</p></div>'; return; }
        c.innerHTML = items.map((ep) => `
          <div class="glass" style="display:flex;align-items:center;gap:0.75rem;padding:0.75rem;border-radius:0.75rem;margin-bottom:0.5rem">
            <a href="watch.html?seriesId=${ep.series_id}&seasonId=${ep.season_id}&episodeId=${ep.id}" style="display:flex;align-items:center;gap:0.75rem;flex:1">
              <div style="width:6rem;height:3.5rem;background:var(--gradient);border-radius:0.375rem;display:flex;align-items:center;justify-content:center;color:white;font-weight:700">${ep.number}</div>
              <div><p style="font-weight:500">${escapeHTML(ep.title)}</p><p style="font-size:0.75rem;color:var(--muted)">حلقة ${ep.number}</p></div>
            </a>
            <button data-rm="${ep.id}" class="icon-btn" style="color:#FCA5A5">✕</button>
          </div>
        `).join('');
        c.querySelectorAll('[data-rm]').forEach((b) => b.onclick = () => {
          IDLEB.stores.queue.set((q) => ({ ...q, items: q.items.filter((e) => e.id !== b.dataset.rm) }));
          render();
        });
      }
      render();
      document.getElementById('clear').onclick = () => { if (confirm('مسح؟')) { IDLEB.stores.queue.set({ items: [] }); render(); } };
    })();
  </script>
</body>
</html>
